<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeSee Grounded Answer Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --primary: #4f46e5;
            --primary-hover: #6366f1;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-error: #ef4444;
            --accent-success: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
        body {
            background: radial-gradient(circle at top, #1e1b4b 0%, #0b0f19 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }
        .container {
            width: 100%;
            max-width: 720px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2rem; }
        .form-group { position: relative; margin-bottom: 1.5rem; }
        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }
        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        button:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .result-container {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--card-border);
            display: none;
        }
        .result-label { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; }
        .result-label.success { color: var(--accent-success); }
        .result-label.error { color: var(--accent-error); }
        .answer { font-size: 1.1rem; line-height: 1.6; margin-bottom: 1.5rem; white-space: pre-wrap; }
        .answer.error-text { color: var(--accent-error); opacity: 0.9; }
        .citations-section {
            margin-top: 1.5rem;
        }
        .citations-header {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .citations-header::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--card-border);
        }
        .citations-container { display: flex; flex-direction: column; gap: 0.75rem; }
        .citation-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 1.25rem;
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .citation-card:hover {
            border-color: rgba(99, 102, 241, 0.3);
            transform: translateY(-1px);
        }
        .citation-doc {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(79, 70, 229, 0.12);
            color: #a5b4fc;
            border: 1px solid rgba(79, 70, 229, 0.25);
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-bottom: 0.75rem;
        }
        .citation-quote {
            font-style: normal;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #d1d5db;
            border-left: 3px solid var(--primary);
            padding-left: 1rem;
            margin-left: 2px;
        }
        .citation-quote strong {
            color: #ffffff;
            font-weight: 600;
        }
        .loading { display: none; text-align: center; color: var(--text-muted); padding: 1.5rem 0; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WeSee Grounded Engine</h1>
        <p class="subtitle">Enter your query to get instant, fully grounded answers backed by verified citations.</p>
        
        <form id="askForm" onsubmit="handleAsk(event)">
            <div class="form-group">
                <input type="text" id="questionInput" placeholder="What is the support response SLA for Growth plan?" required autocomplete="off">
            </div>
            <button type="submit" id="submitBtn">Ask Question</button>
        </form>

        <div class="loading" id="loadingState">Analyzing corpus and verifying sources...</div>

        <div class="result-container" id="resultArea">
            <div id="statusLabel" class="result-label"></div>
            <div id="answerText" class="answer"></div>
            <div class="citations-container" id="citationsArea"></div>
        </div>
    </div>

    <script>
        function renderMarkdown(text) {
            if (!text) return "";
            
            // Handle escaped asterisks that some models output in JSON responses
            let html = text.replace(/\\\*/g, '*');
            
            // Safe HTML escape to prevent XSS
            html = html
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;");
            
            // Replace **bold** with <strong>bold</strong>
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            // Replace *italic* with <em>italic</em>
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            
            // Format inline code backticks with premium badge styling
            html = html.replace(/`(.*?)`/g, '<code style="background: rgba(255, 255, 255, 0.06); padding: 2px 6px; border-radius: 4px; font-family: monospace; font-size: 0.9em; border: 1px solid rgba(255, 255, 255, 0.1); color: #c7d2fe;">$1</code>');

            // Format space-separated bullet points into newlines so they parse as lists
            html = html.replace(/\s+-\s+/g, '\n- ');
            
            // Split by newline and format lists
            const lines = html.split('\n');
            const parsedLines = lines.map(line => {
                const trimmed = line.trim();
                if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
                    return `<li style="margin-left: 1.5rem; margin-top: 0.6rem; margin-bottom: 0.6rem; list-style-type: disc; color: #e0e7ff;">${trimmed.substring(2)}</li>`;
                }
                const numMatch = trimmed.match(/^(\d+)\.\s+(.*)/);
                if (numMatch) {
                    return `<div style="margin-left: 1rem; margin-top: 0.6rem; margin-bottom: 0.6rem; display: flex; gap: 0.5rem; color: #e0e7ff;"><span>${numMatch[1]}.</span><span>${numMatch[2]}</span></div>`;
                }
                return line;
            });
            
            html = parsedLines.join('\n');
            html = html.replace(/\n/g, '<br>');
            
            if (html.startsWith('"') && html.endsWith('"')) {
                html = html.substring(1, html.length - 1);
            }
            return html;
        }

        async function handleAsk(e) {
            e.preventDefault();
            const question = document.getElementById('questionInput').value.trim();
            if (!question) return;

            const submitBtn = document.getElementById('submitBtn');
            const loadingState = document.getElementById('loadingState');
            const resultArea = document.getElementById('resultArea');
            const statusLabel = document.getElementById('statusLabel');
            const answerText = document.getElementById('answerText');
            const citationsArea = document.getElementById('citationsArea');

            submitBtn.disabled = true;
            loadingState.style.display = 'block';
            resultArea.style.display = 'none';

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                
                if (data.answered) {
                    statusLabel.className = 'result-label success';
                    statusLabel.textContent = '● Grounded Answer Found';
                    answerText.className = 'answer';
                    answerText.innerHTML = renderMarkdown(data.answer);
                } else {
                    statusLabel.className = 'result-label error';
                    statusLabel.textContent = '● Not Found in Documents';
                    answerText.className = 'answer error-text';
                    answerText.innerHTML = renderMarkdown(data.answer);
                }

                citationsArea.innerHTML = '';
                if (data.citations && data.citations.length > 0) {
                    const header = document.createElement('div');
                    header.className = 'citations-header';
                    header.textContent = 'Sources & Citations';
                    citationsArea.appendChild(header);

                    const listContainer = document.createElement('div');
                    listContainer.className = 'citations-container';

                    data.citations.forEach(c => {
                        const card = document.createElement('div');
                        card.className = 'citation-card';
                        
                        const docDiv = document.createElement('div');
                        docDiv.className = 'citation-doc';
                        docDiv.innerHTML = `📄 <span>${c.doc}</span>`;
                        
                        const quoteDiv = document.createElement('div');
                        quoteDiv.className = 'citation-quote';
                        quoteDiv.innerHTML = renderMarkdown(c.quote);
                        
                        card.appendChild(docDiv);
                        card.appendChild(quoteDiv);
                        listContainer.appendChild(card);
                    });
                    citationsArea.appendChild(listContainer);
                }

                resultArea.style.display = 'block';
            } catch (err) {
                statusLabel.className = 'result-label error';
                statusLabel.textContent = '● Connection Error';
                answerText.className = 'answer error-text';
                answerText.textContent = 'Failed to communicate with the grounded answer service.';
                citationsArea.innerHTML = '';
                resultArea.style.display = 'block';
            } finally {
                submitBtn.disabled = false;
                loadingState.style.display = 'none';
            }
        }
    </script>
</body>
</html>
